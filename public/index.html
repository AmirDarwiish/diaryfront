<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  
  <meta name="theme-color" content="#080d16" />

  <title>Zeiia ERP | نظام إدارة الموارد</title>

  <meta name="description" content="نظام Zeiia المتكامل لإدارة و متابعة الإنتاج، المخزون، المبيعات والتوزيع بكل سهولة." />
  <meta name="author" content="Zeiia Software" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #080d16;
      --gold: #C9A96E;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-deep);
      font-family: 'Cairo', sans-serif;
      overflow: hidden; /* يمنع السكرول أثناء التحميل */
    }
    .zeiia-preloader {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    .spinner-box {
      width: 50px;
      height: 50px;
      position: relative;
    }
    .spinner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 3px solid rgba(201, 169, 110, 0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .brand-logo {
      margin-top: 20px;
      color: var(--gold);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.3s;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(-5px); }
    }
  </style>
</head>

<body>
  <noscript>يجب تفعيل JavaScript لتشغيل نظام Zeiia ERP.</noscript>

  <div id="root">
    <div class="zeiia-preloader">
      <div class="spinner-box">
        <div class="spinner"></div>
      </div>
      <div class="brand-logo">ZEIIA ERP</div>
    </div>
  </div>

  </body>
</html>
